<!DOCTYPE HTML>
<html>
<meta charset="UTF-8">

<head>

<style>
body{
    background-color: antiquewhite;
    justify-content: center;
    align-items: center;
    display: flex;
    height: 100vh;
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;

}
.login-container{
    box-shadow: 2px 1px 23px 0px #000000;
    border: 0;
    border-radius: 30px;
    height: 50%;
    width: 30%;

    padding: 20px;
}
.login-container input{
    background-color:rgb(179, 179, 179);
    width: 500px;

    margin: 5px;
    border-radius: 5px;
    box-sizing: border-box;
}
.login-container button{
    padding: 10px 20px;
    border: none;   
    border-radius: 4px;     
    cursor: pointer;
}
.login-container button:hover{
    background-color: aquamarine;
}

<body>
