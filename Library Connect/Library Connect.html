<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title> Library Connect </title>


<style>
  body {
    font-family: 'Roboto', sans-serif;
    margin: 20px;
    background-color: #fafafa;
    background-image: url(lib.jpg);
    background-repeat: no-repeat;
    background-position: center;
    background-attachment: fixed;
    background-size: cover;
  }

  header {
    text-align: center;
    margin-bottom: 10px;
  
  }

  h1 {
    font-size: 2em;
    color: #eeeeee;
  }

 
  .library-button {
    font-family: 'Roboto', sans-serif;
    background-color: #fff8dc;
    border: 2px solid #8b4513;
    border-radius: 8px;
    padding: 10px 20px;
    cursor:pointer;
    font-size: 1em;
    margin: 10px;
    box-shadow: 3px 3px 0 #8b4513;
    transition: all 0.2s; 
    display:ruby;
  }

  .library-button:hover {
    background-color: #ebdd63;
    box-shadow: 2px 2px 0 #8b4513;
  }

 
  .container {
    max-width: 1500px;
    margin: 0 auto;
    text-align: center;
  
  }

 
  #searchInput {
    padding: 10px;
    width: 90%;
    max-width: 700px;
    border: 2px solid #8b4513;
    border-radius: 4px;
    font-family: 'Roboto', sans-serif;
    font-size: 2em;
  }

 
  #infoDisplay {
    margin-top: 20px;
    padding: 15px;
    border: 2px solid #8b4513;
    border-radius: 8px;
    background-color: #fff;
    min-height: 100px;
  }

</style>
</head>
<body>

<header>
  <h1>Library Connect</h1>
</header>

<div class="container">
 
  <input type="text" id="searchInput" placeholder="Search for books, members, loans..." />

 
  <div>
    <button class="library-button" onclick="showMembers()">Members</button>
    <button class="library-button" onclick="showLoans()">Loans</button>
    <button class="library-button" onclick="showOverdue()">Info: Overdue</button>
  </div>


  <div id="infoDisplay">Click a button to display information.</div>
</div>

<script>
  
  const members = [
    'Adrian Amigo',
    'Adrian gwapings',
    'ad gwapings',
    'adpogi',
    'and many more'
    
  ];

  const loans = [
    { book: 'Mathematics 101', member: 'Adrian Amigo', dueDate: '1999-10-10' },
    { book: 'History of Art', member: 'Adrian gwapings', dueDate: '2027-09-25' },
     { book: 'eewwan', member: 'adpogi1232', dueDate: '2017-09-25' },
     { book: 'ap', member: 'adpogi32232', dueDate: '2017-09-25' },
     { book: 'history', member: 'adpogi3232', dueDate: '2017-09-25' },
     { book: 'Science', member: 'adpogi3232', dueDate: '2017-09-25' },
     { book: 'Science', member: 'adpogi3232323', dueDate: '2017-09-25' },
    { book: 'Physics Fundamentals', member: 'ad gwapings', dueDate: '1930-10-05' }
  ];
 
  

  
  function showMembers() {
    const infoDiv = document.getElementById('infoDisplay');
    let html = '<h3>Members</h3> <ul>';
    members.forEach(m => {
      html += `<li>${m}</li>`; 
    });
    html += '</ul>';
    infoDiv.innerHTML = html;
  }

  function showLoans() {
    const infoDiv = document.getElementById('infoDisplay');
    let html = '<h3>Loans</h3><ul>';
    loans.forEach(l => {
      html += `<li>Book: ${l.book} | Member: ${l.member} | Due: ${l.dueDate}</li>`;
    });
    html += '</ul>';
    infoDiv.innerHTML = html;
  }


  function showOverdue() {
    const infoDiv = document.getElementById('infoDisplay');
    const today = new Date().toISOString().slice(0, 10);
    const overdueLoans = loans.filter(l => l.dueDate < today);
    if (overdueLoans.length === 0) {
      infoDiv.innerHTML = '<p>No overdue loans.</p>';
    } else {
      let html = '<h3>Overdue Loans</h3><ul>';
      overdueLoans.forEach(l => {
        html += `<li>Book: ${l.book} | Member: ${l.member} | Due: ${l.dueDate}</li>`;
      });
      html += '</ul>';
      infoDiv.innerHTML = html;
    }
  }

  
  document.getElementById('searchInput').addEventListener('input', function() {
    const query = this.value.toLowerCase();
    const infoDiv = document.getElementById('infoDisplay');

   

    let html = '';

    

    if (html === '') {
      html = '<b><p>No results found.</p></b>';
    }

    infoDiv.innerHTML = html;
  });
</script>

</body>
</html>
